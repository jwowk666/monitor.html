<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <style>
        body { 
            background-color: #000; 
            color: #fff; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0;
        }
        .container { display: flex; gap: 40px; }
        .box { 
            background-color: #fff; 
            color: #000; 
            padding: 40px; 
            border-radius: 20px; 
            width: 220px; 
            text-align: center; 
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(255,255,255,0.1);
        }
        .number { font-size: 3.5em; display: block; margin-top: 10px; }
        button { 
            margin-top: 50px; 
            padding: 12px 25px; 
            cursor: pointer; 
            background: #333; 
            color: white; 
            border: none; 
            border-radius: 5px;
        }
        button:hover { background: #555; }
    </style>
</head>
<body>

    <div class="container">
        <div class="box">
            عدد الهجمات
            <span id="attack-count" class="number">0</span>
        </div>
        <div class="box">
            حالة الحماية
            <div id="status" class="number" style="font-size: 2em; padding-top: 10px;">قوي</div>
        </div>
    </div>

    <button onclick="simulateAttack()">تجربة هجوم</button>

    <script>
        let count = 0;
        function simulateAttack() {
            count++;
            document.getElementById('attack-count').innerText = count;
            
            let statusEl = document.getElementById('status');
            if (count > 0 && count < 5) {
                statusEl.innerText = "وسط";
            } else if (count >= 5) {
                statusEl.innerText = "ضعيف";
                statusEl.style.color = "red";
            }
        }
    </script>
</body>
</html>
